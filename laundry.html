<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>누가돌려?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <header class="flex justify-between items-center p-6">
    <button onclick="location.href='index.html'" class="flex items-center gap-2 text-xl font-bold">
        <span>🫧누가돌려?</span>
    </button>

    <div>
      {% if user_info %}
      <button onclick="doLogout()" class="bg-red-500 text-white px-4 py-2 rounded">
        로그아웃
      </button>
      {% else %}
      <button onclick="OpenLogin()" class="bg-blue-500 text-white px-4 py-2 rounded">
        로그인
      </button>
      {% endif %}
    </div>
  </header>




<!--여기는 세탁기 렌더링-->


  <h1 class="text-4xl font-bold text-center mb-10">세탁기</h1>
  <div class="max-w-5xl mx-auto grid grid-cols-2 gap-10">

    {%if current_user.gender = 'M' %}  1~7까지
        {% for item in items[:7] %}
          <button 
            {% if item.ban or item.using %}
              disabled
            {% else %}
              onclick="location.href='time.html'"
            {% endif %}
            class="
            {% if item.ban %}
              bg-gray-400 cursor-not-allowed text-gray-700
            {% elif item.using %}
              bg-red-400 cursor-not-allowed
            {% else %}
              bg-blue-500 hover:bg-blue-400 active:translate-y-1 active:shadow-sm
            {% endif %}
            rounded-xl shadow-md p-12 text-center text-lg font-semibold
            transform transition duration-100 text-white"
          >


    {% for item in items %}
      <button 
        {% if item.ban or item.using %}
          disabled
        {% else %}
          onclick="location.href='time.html'"
        {% endif %}
        class="
        {% if item.ban %}
          bg-gray-400 cursor-not-allowed text-gray-700
        {% elif item.using %}
          bg-red-400 cursor-not-allowed
        {% else %}
          bg-blue-500 hover:bg-blue-400 active:translate-y-1 active:shadow-sm
        {% endif %}
        rounded-xl shadow-md p-12 text-center text-lg font-semibold
        transform transition duration-100 text-white"
      >
      🫧 {{ item.item }}
        {% if item.ban %}
          <div class="text-sm mt-3">🚫 사용불가</div>
        {% elif item.using %}
          <div class="text-sm mt-3">⏱ 사용경과 : {{ item.elapsed | default('계산중') }}</div>
        {% else %}
          <div class="text-sm mt-3">✅ 사용가능</div>
        {% endif %}
      </button>

    {% endfor %}

    {% elif current_user.gender == 'F' %}

    {% for item in items[5:9] %}
      <button 
        {% if item.ban or item.using %}
          disabled
        {% else %}
          onclick="location.href='time.html'"
        {% endif %}
        class="
        {% if item.ban %}
          bg-gray-400 cursor-not-allowed text-gray-700
        {% elif item.using %}
          bg-red-400 cursor-not-allowed
        {% else %}
          bg-blue-500 hover:bg-blue-400 active:translate-y-1 active:shadow-sm
        {% endif %}
        rounded-xl shadow-md p-12 text-center text-lg font-semibold
        transform transition duration-100 text-white"
      >
        🫧 {{ item.item }}
        {% if item.ban %}
          <div class="text-sm mt-3">🚫 사용불가</div>
        {% elif item.using %}
          <div class="text-sm mt-3">⏱ 사용경과 : {{ item.elapsed | default('계산중') }}</div>
        {% else %}
          <div class="text-sm mt-3">✅ 사용가능</div>
        {% endif %}
      </button>
    {% endfor %}

    
      {% else %}

    {% for item in items[:9] %}
      <button 
        {% if item.ban or item.using %}
          disabled
        {% else %}
          onclick="location.href='time.html'"
        {% endif %}
        class="
        {% if item.ban %}
          bg-gray-400 cursor-not-allowed text-gray-700
        {% elif item.using %}
          bg-red-400 cursor-not-allowed
        {% else %}
          bg-blue-500 hover:bg-blue-400 active:translate-y-1 active:shadow-sm
        {% endif %}
        rounded-xl shadow-md p-12 text-center text-lg font-semibold
        transform transition duration-100 text-white"
      >
        🫧 {{ item.item }}
        {% if item.ban %}
          <div class="text-sm mt-3">🚫 사용불가</div>
        {% elif item.using %}
          <div class="text-sm mt-3">⏱ 사용경과 : {{ item.elapsed | default('계산중') }}</div>
        {% else %}
          <div class="text-sm mt-3">✅ 사용가능</div>
        {% endif %}
      </button>
    {% endfor %}

{% endif %}
    
  </div>



<!--신고하기 버튼입니다-->

  <div class="flex justify-center mt-10 mb-20">
    <button onclick="OpenReport()" class="bg-red-800 rounded-xl shadow-md p-12 text-center text-lg font-semibold text-white hover:bg-red-700 active:translate-y-1 active:shadow-sm transform transition duration-100">
      신고하기
    </button>
  </div>



  <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center z-50">
    <div class="bg-white w-96 p-8 rounded-lg shadow-xl">
      <h2 class="text-2xl font-bold mb-6 text-left">Log In</h2>
      <form id="loginForm">
        <div class="mb-4">
          <label class="block mb-1 text-sm">ID</label>
          <input type="text" id="id" class="w-full border rounded px-3 py-2" required>
        </div>
        <div class="mb-6">
          <label class="block mb-1 text-sm">Password</label>
          <input type="password" id="pwd" class="w-full border rounded px-3 py-2" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
          로그인
        </button>
        <button type="button" onclick="CloseLogin()" class="w-full mt-3 text-gray-500">
          닫기
        </button>
      </form>
    </div>
  </div>



  <div id="reportmodal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center z-50">
    <div class="bg-white w-96 p-8 rounded-lg shadow-xl">
      <h2 class="text-2xl font-bold mb-6 text-left">신고기기선택</h2>
      <form id="reportForm">
        <input type="hidden" name="report_time" id="hidden_time" value="">
        
        <div class="mb-4">      
          <label class="block mb-1 text-sm"></label>
        </div>
        <select id="machineselect" name="machine" class="w-full border rounded px-3 py-2 shadow cursor-pointer focus:ring-2 focus:ring-red-400">
          <option value="">기기 선택</option>
          
          {% for item in items %}
            <option value="{{ item.item }}">
              세탁기 {{ item.item }}
            </option>
          {% endfor %}

        </select>
        <div class="flex justify-end mt-5">
          <button type="submit" class="flex bg-red-800 rounded-xl shadow-md p-4 text-center text-lg font-semibold text-white hover:bg-red-700 active:translate-y-1 active:shadow-sm transform transition duration-100">
            신고하기
          </button>
        </div>
        <button type="button" onclick="CloseReport()" class="w-full mt-3 text-gray-500">
          닫기
        </button>
      </form>
    </div>
  </div>

  <script>
    // --- 세탁기 정보 불러오기  ---
    function updateUI(machineData) {
      let itemName = machineData.item;   // 예: "L1"
      let isUsing = machineData.using;   // 예: true
      let isBanned = machineData.ban;    // 예: false
      let machineId = machineData._id;   // 예: ""
    }
     $.ajax({
    type: "GET", 
    url: "/machine/laundry", 
   success: function(response) {
           response.forEach(function(machine) {
            updateUI(machine)
          });
    },
    error: function(xhr) { 
        alert("데이터를 가져오는 중 오류가 발생했습니다."); 
    }
});


    // --- 로그인 모달 스크립트 ---
    function OpenLogin() {
      document.getElementById("loginModal").classList.remove("hidden");
    }
    function CloseLogin() {
      document.getElementById("loginModal").classList.add("hidden");
    }

    // --- 로그인/로그아웃 AJAX ---
    $('#loginForm').submit(function(e) {
      e.preventDefault(); 
      $.ajax({
        type: "POST", url: "/login", contentType: "application/json",
        data: JSON.stringify({ "id": $('#id').val(), "pwd": $('#pwd').val() }),
        success: function(response) {
          alert("로그인 성공!"); window.location.reload(); 
        },
        error: function(xhr) { alert("아이디 또는 비밀번호가 틀렸습니다."); }
      });
    });

    function doLogout() {
      $.ajax({
        type: "POST", url: "/logout", 
        success: function(response) {
          if (response.result === "success") {
            alert("로그아웃 되었습니다."); window.location.reload(); 
          }
        },
        error: function(xhr) { alert("로그아웃 처리 중 문제가 발생했습니다."); }
      });
    }

    // --- 신고 모달 스크립트 ---
    function OpenReport() {
      document.getElementById("reportmodal").classList.remove("hidden");
    }
    function CloseReport() {
      document.getElementById("reportmodal").classList.add("hidden");
    }

    // --- 신고 post ---
    $('#reportForm').submit(function(e) {
      e.preventDefault(); 
      const selectedMachine = $('#machineselect').val();
      const now = new Date().toLocaleString('ko-KR');

      if (!selectedMachine) {
        alert("기기를 선택해주세요.");
        return;
      }

      $.ajax({
        type: "POST", 
        url: "/report", 
        contentType: "application/json",
        data: JSON.stringify({ 
          "item": selectedMachine,
          "date": now 
        }),
        success: function(response) {
          alert("신고완료!"); 
          window.location.reload(); 
          CloseReport();
        },
        error: function(xhr) { 
          alert("신고 접수 중 오류가 발생했습니다."); 
        }
      });
    });
  </script>

</body>
</html>
