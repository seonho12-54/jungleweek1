<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>누가돌려?</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>



<body class="bg-gray-100 min-h-screen">

  <!-- 상단 네비 -->
  <header class="flex justify-between items-center p-6">
    <button onclick="location.href='index.html'"class="flex items-center gap-2 text-xl font-bold">
       <span>♨️누가돌려?</span>

       
    </button>

    <button onclick="OpenLogin()" class="border border-blue-500 text-blue-600 px-6 py-2 rounded">
      로그인
    </button>
  </header>

  <!-- 타이틀 -->
  <h1 class="text-4xl font-bold text-center mb-10">건조기</h1>


<div class="max-w-5xl mx-auto grid grid-cols-2 gap-10">
  {%for item in items %}
    <button 
      {% if item.ban or item.using %}
        disabled
        {%else%}
        onclick = "location.href='time.html'"
        {%endif%}
        class="
        {% if item.ban %}
          bg-gray-400 cursor-not-allowed text-gray-700
        {% elif item.using %}
          bg-red-400 cursor-not-allowed
        {% else %}
          bg-blue-500 hover:bg-blue-400 active:translate-y-1 active:shadow-sm
        {% endif %}
        rounded-xl shadow-md p-12 text-center text-lg font-semibold
        transform transition duration-100 text-white
        "
        >
      🫧 {{ item.item }}
      {% if item.ban %}
        <div class="text-sm mt-3">🚫 사용불가</div>
      {% elif item.using %}
        <div class="text-sm mt-3">⏱ 사용경과 : {{ item.elapsed | default('계산중') }}</div>
      {% else %}
        <div class="text-sm mt-3">✅ 사용가능</div>
      {% endif %}
    </button>
      {% endfor %}
  </div>

  <div class="flex justify-center mt-10 mb-20">
    <button class="bg-red-800 rounded-xl shadow-md p-12 text-center text-lg font-semibold text-white hover:bg-red-700 active:translate-y-1 active:shadow-sm transform transition duration-100">
      신고하기
    </button>
  </div>
      </button>


</div>

  
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center">
    
    <div class="bg-white w-96 p-8 rounded-lg shadow-xl">
      <h2 class="text-2xl font-bold mb-6 text-left">Log In</h2>
      <form method ="POST" action="/login">
        
    <!-- 아이디 -->
      <div class="mb-4">
        <label class="block mb-1 text-sm">ID</label>
        
        <input type="text" name="id" class="w-full border rounded px-3 py-2 " placeholder="아이디를 입력하세요" required>
      </div>
      
   <!-- 비밀번호 -->
      <div class="mb-6">
        <label class="block mb-1 text-sm">Password</label>
        <input type="password" name="pwd" class="w-full border rounded px-3 py-2" placeholder="비밀번호를 입력하세요" required>
      </div>
      
      
      <button type ="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        로그인
      </button>

      <button onclick="CloseLogin()" class="w-full mt-3 text-gray-500">
        닫기
      </button>

      </form>
    </div>


    
  </div>



  <script>
    function OpenLogin() {
      document.getElementById("loginModal").classList.remove("hidden");
    }
    function CloseLogin() {
      document.getElementById("loginModal").classList.add("hidden");
    }
  </script>


</body>
</html>
