<!doctype html>
<html lang="ko">
  <head>
    <!-- 여긴 임포트입니다-->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>누가돌려?</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Pretendard", "sans-serif"],
            },
          },
        },
      }
    </script>
  </head>

  <body class="h-screen bg-gray-100 flex flex-col items-center justify-center">
    {% include 'common.html' %}
    <a
      href="{{ url_for('home') }}"
      class="absolute top-5 left-5 flex items-center gap-2 text-xl font-bold"
    >
      <img
        src="{{ url_for('static', filename='images/로고.png') }}"
        class="h-16 w-auto"
      />
    </a>
    <header class="flex">
      {% if user_info %}
      <button
        onclick="doLogout()"
        class="absolute top-5 right-5 px-6 py-2 border border-blue-500 text-blue-600"
      >
        로그아웃
      </button>
      {% else %}
      <button
        onclick="openLogin()"
        class="absolute top-5 right-5 px-6 py-2 border border-blue-500 text-blue-600"
      >
        로그인
      </button>
      {% endif %}
    </header>

    <div
      class="w-11/12 md:w-2/3 h-auto md:h-1/2 bg-gray-300 rounded-2xl shadow-lg flex flex-col md:flex-row items-center justify-center gap-6 md:gap-10 p-6 md:p-10"
    >
      <a
        href="{{ url_for('find_machine', machine_type='laundry') }}"
        class="flex flex-col items-center justify-center p-8 w-full md:w-1/3 bg-blue-50 rounded-xl shadow-md hover:shadow-xl transition duration-300"
      >
        <img
          src="{{ url_for('static', filename='images/세탁기.png') }}"
          class="h-24 md:h-32 w-auto object-contain mb-4"
        />
        <div class="text-center">
          <h2 class="text-xl font-bold text-gray-800">세탁기</h2>
        </div>
      </a>

      <a
        href="{{ url_for('find_machine', machine_type='dryer') }}"
        class="flex flex-col items-center justify-center p-8 w-full md:w-1/3 bg-orange-50 rounded-xl shadow-md hover:shadow-xl transition duration-300"
      >
        <img
          src="{{ url_for('static', filename='images/건조기.png') }}"
          class="h-24 md:h-32 w-auto object-contain mb-4"
        />
        <div class="text-center">
          <h2 class="text-xl font-bold text-gray-800">건조기</h2>
        </div>
      </a>
    </div>

    <!--나의 예약정보를 가져오고 세탁기누르면 세탁 정보 건조기 누르면 건조기정보 아이디와 예약시간을 넣는다-->
    {% if user_info %}

    <div class="w-11/12 md:w-2/3 mt-6">
      <!-- 제목 -->
      <div class="text-gray-700 font-semibold mb-2">내 예약 확인</div>

      <div
        class="h-24 bg-gray-300 rounded-2xl shadow-lg flex items-center p-4 gap-4"
      >
        <button
          onclick="showMyWasher()"
          class="flex items-center gap-2 px-3 h-12 bg-white rounded-lg shadow hover:bg-gray-100 transition"
        >
          <img
            src="{{ url_for('static', filename='images/세탁기.png') }}"
            class="h-6 w-6"
          />
          <span class="text-sm font-medium">세탁기</span>
        </button>

        <button
          onclick="showMyDryer()"
          class="flex items-center gap-2 px-3 h-12 bg-white rounded-lg shadow hover:bg-gray-100 transition"
        >
          <img
            src="{{ url_for('static', filename='images/건조기.png') }}"
            class="h-6 w-6"
          />
          <span class="text-sm font-medium">건조기</span>
        </button>

        <div
          class="flex-1 h-12 bg-white rounded-xl shadow-inner flex items-center px-4 gap-3"
        >
          <img
            src="{{ url_for('static', filename='images/사용자.png') }}"
            class="h-6 w-6 opacity-60"
          />
          <span id="display-id" class="text-gray-600 font-medium"></span>
        </div>

        <div
          class="flex-1 h-12 bg-white rounded-xl shadow-inner flex items-center px-4 gap-3"
        >
          <img
            src="{{ url_for('static', filename='images/예약시간.png') }}"
            class="h-6 w-6 opacity-60"
          />
          <span id="display-time" class="text-gray-600 font-medium">--:--</span>
        </div>
      </div>
    </div>

    {% endif %}
    <script>
      // 정보를 화면에 업데이트하는 공통 함수 (기존과 동일)
      function updateInfo(name, time) {
        $("#display-id").text(name)
        $("#display-time").text(time)
      }

      // 세탁기 정보 가져오기
      function showMyWasher() {
        $.ajax({
          type: "GET",
          url: "/own/laundry",
          success: function (response) {
            let data = response.result
            if (data) {
              // "2026-03-06 07:10:00" -> "2026-03-06 07:10" (앞에서 16자)
              let startFull = data.start.substring(0, 16)
              let endFull = data.end.substring(0, 16)

              // 만약 시작일과 종료일이 같다면 시간만 표시하고 싶을 수도 있지만,
              // 요청하신 대로 풀 형식을 유지한다면 아래와 같이 구성합니다.
              updateInfo(data.name, startFull + " ~ " + endFull.split(" ")[1])
              // 결과 예: "홍길동", "2026-03-06 07:10 ~ 08:10"
            } else {
              updateInfo("예약 없음", "--:--")
            }
          },
          error: function () {
            alert("예약된 날짜가 없습니다.")
          },
        })
      }

      // 건조기 정보 가져오기
      function showMyDryer() {
        $.ajax({
          type: "GET",
          url: "/own/dryer",
          success: function (response) {
            let data = response.result
            if (data) {
              let startFull = data.start.substring(0, 16)
              let endFull = data.end.substring(0, 16)

              updateInfo(data.name, startFull + " ~ " + endFull.split(" ")[1])
            } else {
              updateInfo("예약 없음", "--:--")
            }
          },
          error: function () {
            alert("예약된 날짜가 없습니다.")
          },
        })
      }
    </script>
  </body>
</html>
