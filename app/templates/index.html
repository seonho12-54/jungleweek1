<!doctype html>
<html lang="ko">
  <head>
    <!-- 여긴 임포트입니다-->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>누가돌려?</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Pretendard", "sans-serif"],
            },
          },
        },
      }
    </script>
  </head>

  <body class="h-screen bg-gray-100 flex flex-col items-center justify-center">
    <a
      href="{{ url_for('home') }}"
      class="absolute top-5 left-5 flex items-center gap-2 text-xl font-bold"
    >
      <img
        src="{{ url_for('static', filename='images/로고.png') }}"
        class="h-16 w-auto"
      />
    </a>
    <header class="flex">
      {% if user_info %}
      <button
        onclick="doLogout()"
        class="absolute top-5 right-5 px-6 py-2 border border-blue-500 text-blue-600"
      >
        로그아웃
      </button>
      {% else %}
      <button
        onclick="openLogin()"
        class="absolute top-5 right-5 px-6 py-2 border border-blue-500 text-blue-600"
      >
        로그인
      </button>
      {% endif %}
    </header>

    <div
      class="w-11/12 md:w-2/3 h-auto md:h-1/2 bg-gray-300 rounded-2xl shadow-lg flex flex-col md:flex-row items-center justify-center gap-6 md:gap-10 p-6 md:p-10"
    >
      <a
        href="{{ url_for('find_machine', machine_type='laundry') }}"
        class="flex flex-col items-center justify-center p-8 w-full md:w-1/3 bg-blue-50 rounded-xl shadow-md hover:shadow-xl transition duration-300"
      >
        <img
          src="{{ url_for('static', filename='images/세탁기.png') }}"
          class="h-24 md:h-32 w-auto object-contain mb-4"
        />
        <div class="text-center">
          <h2 class="text-xl font-bold text-gray-800">세탁기</h2>
        </div>
      </a>

      <a
        href="{{ url_for('find_machine', machine_type='dryer') }}"
        class="flex flex-col items-center justify-center p-8 w-full md:w-1/3 bg-orange-50 rounded-xl shadow-md hover:shadow-xl transition duration-300"
      >
        <img
          src="{{ url_for('static', filename='images/건조기.png') }}"
          class="h-24 md:h-32 w-auto object-contain mb-4"
        />
        <div class="text-center">
          <h2 class="text-xl font-bold text-gray-800">건조기</h2>
        </div>
      </a>
    </div>

    {% include 'common.html' %}

    <!--나의 예약정보를 가져오고 세탁기누르면 세탁 정보 건조기 누르면 건조기정보 아이디와 예약시간을 넣는다-->
    {% if user_info %}

    <div
      class="w-full max-w-4xl h-24 bg-gray-300 rounded-xl shadow-lg flex items-center p-4 gap-4 mt-6"
    >
      <button
        onclick="showMyWasher()"
        class="w-12 h-12 bg-white rounded-lg shadow hover:bg-gray-100 flex items-center justify-center transition"
      >
        <img
          src="{{ url_for('static', filename='images/세탁기.png') }}"
          class="h-8 w-8"
          alt="세탁기"
        />
      </button>

      <button
        onclick="showMyDryer()"
        class="w-12 h-12 bg-white rounded-lg shadow hover:bg-gray-100 flex items-center justify-center transition"
      >
        <img
          src="{{ url_for('static', filename='images/건조기.png') }}"
          class="h-8 w-8"
          alt="건조기"
        />
      </button>

      <div
        class="flex-1 h-12 bg-white rounded-xl shadow-inner flex items-center px-4 gap-3"
      >
        <img
          src="{{ url_for('static', filename='images/사용자.png') }}"
          class="h-6 w-6 opacity-60"
        />
        <span id="display-id" class="text-gray-600 font-medium"
          >아이콘 클릭</span
        >
      </div>

      <div
        class="flex-1 h-12 bg-white rounded-xl shadow-inner flex items-center px-4 gap-3"
      >
        <img
          src="{{ url_for('static', filename='images/예약시간.png') }}"
          class="h-6 w-6 opacity-60"
        />
        <span id="display-time" class="text-gray-600 font-medium">--:--</span>
      </div>
    </div>

    {% endif %}

    <script>
      // 3. 세탁기 버튼을 눌렀을 때 실행될 함수
      function showMyWasher() {
        if (myWasherData) {
          // 예약이 있으면 가져온 JSON 데이터로 텍스트를 만듭니다.
          let timeText = myWasherData.end + " ~ " + (myWasherData.period || "")
          updateInfo(myWasherData.id, timeText)
        } else {
          // 예약이 없으면 없다고 표시합니다.
          updateInfo("예약 없음", "--:--")
        }
      }

      // 4. 건조기 버튼을 눌렀을 때 실행될 함수
      function showMyDryer() {
        if (myDryerData) {
          let timeText = myDryerData.end + " ~ " + (myDryerData.period || "")
          updateInfo(myDryerData.id, timeText)
        } else {
          updateInfo("예약 없음", "--:--")
        }
      }
    </script>
  </body>
</html>
