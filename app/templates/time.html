<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>누가돌려?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Pretendard", "sans-serif"],
            },
          },
        },
      }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    {% include 'ajax-setup.html' %} {% include 'csrf-helper.html' %}
    <!-- <div id="machine-type">{{ machine_type }}</div> -->
    <a
      href="{{ url_for('home') }}"
      class="absolute top-5 left-5 flex items-center gap-2 text-xl font-bold"
    >
      <img
        src="{{ url_for('static', filename='images/로고.png') }}"
        class="h-16 w-auto"
      />
    </a>
    <header class="flex">
      {% if current_user %}
      <button
        onclick="doLogout()"
        class="absolute top-5 right-5 px-6 py-2 border border-blue-500 text-blue-600"
      >
        로그아웃
      </button>
      {% else %}
      <button
        onclick="openLogin()"
        class="absolute top-5 right-5 px-6 py-2 border border-blue-500 text-blue-600"
      >
        로그인
      </button>
      {% endif %}
    </header>

    <h1 id="pageTitle" class="mt-24 text-4xl font-bold text-center mb-10">
      세탁기
    </h1>

    <div class="max-w-6xl mx-auto px-6">
      <div class="grid grid-cols-12 gap-10">
        <div class="col-span-12 lg:col-span-7">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <label class="text-sm font-semibold text-neutral-700"
                >AM/PM</label
              >
              <select
                id="ampm"
                class="px-3 py-2 border border-neutral-300 rounded bg-white"
              >
                <option value="AM">AM</option>
                <option value="PM">PM</option>
              </select>
            </div>

            <div class="flex items-center gap-2">
              <button
                id="prevDay"
                class="w-9 h-9 border border-neutral-300 rounded hover:bg-neutral-50"
              >
                ◀
              </button>

              <div
                class="text-sm font-semibold text-neutral-800 w-52 text-center"
              >
                <span id="dayLabel">월</span>
                <span
                  class="text-neutral-500 font-normal"
                  id="dateLabel"
                ></span>
              </div>

              <button
                id="nextDay"
                class="w-9 h-9 border border-neutral-300 rounded hover:bg-neutral-50"
              >
                ▶
              </button>
            </div>
          </div>

          <div class="mt-4 border-t border-neutral-700"></div>

          <div class="mt-3">
            <div id="timeGrid" class="grid grid-cols-6 gap-2"></div>
          </div>

          <div id="pickInfo" class="mt-3 text-sm text-neutral-700"></div>
        </div>

        {% if current_user %}
        <div class="col-span-12 lg:col-span-5">
          <div class="text-lg font-bold text-neutral-800 text-center">
            예약 목록
          </div>

          <div id="reservationList" class="mt-4 space-y-3"></div>

          <button
            id="reserveBtn"
            class="mt-10 w-full py-4 bg-blue-600 text-white text-2xl font-extrabold rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            예약하기
          </button>
        </div>
        {% endif %}
      </div>
    </div>

    <div
      id="loginModal"
      class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center"
    >
      <div class="bg-white w-96 p-8 rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-left">Log In</h2>
        <div class="mb-4">
          <label class="block mb-1 text-sm">ID</label>
          <input
            type="email"
            class="w-full border rounded px-3 py-2"
            placeholder="아이디를 입력하세요"
          />
        </div>
        <div class="mb-6">
          <label class="block mb-1 text-sm">Password</label>
          <input
            type="password"
            class="w-full border rounded px-3 py-2"
            placeholder="비밀번호를 입력하세요"
          />
        </div>
        <button
          class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700"
        >
          로그인
        </button>
        <button onclick="CloseLogin()" class="w-full mt-3 text-gray-500">
          닫기
        </button>
      </div>
    </div>
    <script id="reserves-data" type="application/json">
      {{ reserves | tojson }}
    </script>

    <script>
      const SLOT_STEP_SEC = 10 * 60
      const MAX_SELECT_SEC = 2 * 60 * 60

      const AM_START = { h: 6, m: 0 }
      const AM_END = { h: 11, m: 50 }
      const PM_START = { h: 12, m: 0 }
      const PM_END = { h: 23, m: 50 }

      const days = ["월", "화", "수", "목", "금", "토", "일"]
      let dayIndex = 0

      const ampmByDay = Array(7).fill("AM")
      const reservations = []

      let selectedStartSec = null
      let selectedEndSec = null

      const now = new Date()
      const jsDay = now.getDay()
      const diffToMon = jsDay === 0 ? -6 : 1 - jsDay
      const monday = new Date(now)
      monday.setDate(now.getDate() + diffToMon)
      monday.setHours(0, 0, 0, 0)

      function OpenLogin() {
        document.getElementById("loginModal").classList.remove("hidden")
      }
      function CloseLogin() {
        document.getElementById("loginModal").classList.add("hidden")
      }

      function pad2(n) {
        return String(n).padStart(2, "0")
      }

      function fmtHM(totalSec) {
        const h = Math.floor(totalSec / 3600) % 24
        const m = Math.floor((totalSec % 3600) / 60)
        return `${pad2(h)}:${pad2(m)}`
      }

      function toTotalSec(h, m) {
        return h * 3600 + m * 60
      }

      function dateStrForDayIndex(idx) {
        const d = new Date(monday)
        d.setDate(monday.getDate() + idx)
        return `${d.getFullYear()}/${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}`
      }

      function updateDayLabels() {
        const dateStr = dateStrForDayIndex(dayIndex)
        document.getElementById("dayLabel").textContent = days[dayIndex]
        document.getElementById("dateLabel").textContent = ` (${dateStr})`
      }

      function getRangeForAmpm(ampm) {
        if (ampm === "AM") {
          return {
            start: toTotalSec(AM_START.h, AM_START.m),
            end: toTotalSec(AM_END.h, AM_END.m),
          }
        }
        return {
          start: toTotalSec(PM_START.h, PM_START.m),
          end: toTotalSec(PM_END.h, PM_END.m),
        }
      }

      function buildTimeSlots(ampm) {
        const { start, end } = getRangeForAmpm(ampm)
        const slots = []
        for (let t = start; t <= end; t += SLOT_STEP_SEC) slots.push(t)
        return slots
      }

      function resetPick() {
        selectedStartSec = null
        selectedEndSec = null
      }

      function getReservedStatusForDay(dayIdx, sec) {
        const hit = reservations.find(
          (r) => r.dayIndex === dayIdx && r.startSec <= sec && sec <= r.endSec,
        )
        if (!hit) return null
        return hit.own ? "own" : "other"
      }

      function isReservedSecondForDay(dayIdx, sec) {
        return !!getReservedStatusForDay(dayIdx, sec)
      }

      function isRangeSelectable(dayIdx, startSec, endSec) {
        const a = Math.min(startSec, endSec)
        const b = Math.max(startSec, endSec)
        for (let t = a; t <= b; t += SLOT_STEP_SEC) {
          if (isReservedSecondForDay(dayIdx, t)) return false
        }
        return true
      }

      function inCurrentPickRange(sec) {
        if (selectedStartSec == null) return false
        if (selectedEndSec == null) return sec === selectedStartSec
        const a = Math.min(selectedStartSec, selectedEndSec)
        const b = Math.max(selectedStartSec, selectedEndSec)
        return a <= sec && sec <= b
      }

      function getCurrentPickRange() {
        if (selectedStartSec == null || selectedEndSec == null) return null
        const startSec = Math.min(selectedStartSec, selectedEndSec)
        const endSec = Math.max(selectedStartSec, selectedEndSec)
        return { startSec, endSec, durSec: endSec - startSec }
      }

      function updatePickInfo() {
        const info = document.getElementById("pickInfo")
        const btn = document.getElementById("reserveBtn")
        const r = getCurrentPickRange()

        if (!r) {
          info.textContent = ""
          if (btn) btn.disabled = true
          return
        }

        const okDur = r.durSec <= MAX_SELECT_SEC
        const okReserved = isRangeSelectable(dayIndex, r.startSec, r.endSec)

        const durMin = Math.floor(r.durSec / 60)
        info.textContent = `${fmtHM(r.startSec)} ~ ${fmtHM(r.endSec)} (${durMin}분)`
        if (btn) btn.disabled = !(okDur && okReserved)
      }

      function isPastSlot(dayIdx, sec) {
        const d = new Date(monday)
        d.setDate(monday.getDate() + dayIdx)

        const h = Math.floor(sec / 3600)
        const m = Math.floor((sec % 3600) / 60)
        const s = sec % 60

        d.setHours(h, m, s, 0)
        return d.getTime() < Date.now()
      }

      function renderGrid() {
        const ampm = document.getElementById("ampm").value
        const grid = document.getElementById("timeGrid")
        grid.innerHTML = ""

        const slots = buildTimeSlots(ampm)

        slots.forEach((sec) => {
          const btn = document.createElement("button")

          const reservedStatus = getReservedStatusForDay(dayIndex, sec)
          const reserved = !!reservedStatus
          const past = isPastSlot(dayIndex, sec)

          let cls =
            "px-3 py-2 border rounded text-sm active:scale-[0.99] transition "

          if (reservedStatus === "own") {
            cls +=
              "border-green-600 bg-green-100 text-green-800 opacity-70 cursor-not-allowed "
            btn.disabled = true
          } else if (reservedStatus === "other") {
            cls +=
              "border-red-600 bg-red-100 text-red-800 opacity-70 cursor-not-allowed "
            btn.disabled = true
          } else if (past) {
            cls +=
              "border-neutral-200 bg-neutral-100 text-neutral-400 cursor-not-allowed "
            btn.disabled = true
          } else {
            cls += "border-neutral-200 hover:bg-neutral-50 "
          }

          if (inCurrentPickRange(sec) && !reserved && !past) {
            cls =
              "px-3 py-2 border rounded text-sm active:scale-[0.99] transition border-blue-600 bg-blue-50 text-blue-700 hover:bg-blue-100"
          }

          btn.className = cls
          btn.textContent = fmtHM(sec)

          if (!reserved && !past) {
            btn.addEventListener("click", () => onTimeClick(sec))
          }

          grid.appendChild(btn)
        })

        updatePickInfo()
      }

      function renderReservations() {
        const list = document.getElementById("reservationList")
        if (!list) return

        list.innerHTML = ""
        ;[...reservations]
          .slice()
          .reverse()
          .forEach((r) => {
            const box = document.createElement("div")
            box.className =
              "border border-neutral-200 rounded p-3 bg-neutral-50 flex items-start justify-between gap-3"

            const left = document.createElement("div")
            left.className = "text-sm text-neutral-800"
            left.innerHTML = `
          <div class="font-semibold">${r.dateStr} (${days[r.dayIndex]})</div>
          <div class="text-neutral-700">${fmtHM(r.startSec)} ~ ${fmtHM(r.endSec)}</div>
        `

            const del = document.createElement("button")
            del.className =
              "text-xs px-2 py-1 border border-neutral-300 rounded hover:bg-white"
            del.textContent = "삭제"

            const pk = r._id
            del.disabled = !pk || !r.own

            del.addEventListener("click", () => {
              if (!pk || !r.own) return
              deleteReservationsData(pk)
            })

            box.appendChild(left)
            box.appendChild(del)
            list.appendChild(box)
          })
      }

      // function loadMachineData() {
      //   const params = new URLSearchParams(window.location.search)
      //   const item = params.get("item") || ""
      //   console.log(item)
      //   if (!item || item.length < 2) return

      //   machineData = { item }

      //   const type = item[0]
      //   const num = item.slice(1)

      //   let name = ""
      //   if (type === "L") name = "세탁기"
      //   else if (type === "D") name = "건조기"

      //   document.getElementById("pageTitle").innerText = name + num

      //   loadReservationsData()
      // }

      function parseDateTime(str) {
        if (!str) return null
        const parts = String(str).trim().split(" ")
        if (parts.length < 2) return null

        const [y, mo, da] = parts[0].split("-").map(Number)
        const [hh, mi, ss] = parts[1].split(":").map(Number)

        if (!y || !mo || !da) return null
        return new Date(y, mo - 1, da, hh || 0, mi || 0, ss || 0, 0)
      }

      function secOfDayFromDate(d) {
        return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds()
      }

      function dayIndexFromDate(d) {
        const a = new Date(monday)
        a.setHours(0, 0, 0, 0)
        const b = new Date(d)
        b.setHours(0, 0, 0, 0)
        return Math.round((b.getTime() - a.getTime()) / 86400000)
      }

      function makeDateTime(dayIdx, sec) {
        const d = new Date(monday)
        d.setDate(monday.getDate() + dayIdx)

        const h = Math.floor(sec / 3600)
        const m = Math.floor((sec % 3600) / 60)
        const s = sec % 60

        const yyyy = d.getFullYear()
        const mm = pad2(d.getMonth() + 1)
        const dd = pad2(d.getDate())

        const hh = pad2(h)
        const mi = pad2(m)
        const ss = pad2(s)

        return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`
      }

      function onTimeClick(sec) {
        if (isPastSlot(dayIndex, sec)) return

        if (selectedStartSec == null) {
          selectedStartSec = sec
          selectedEndSec = null
          renderGrid()
          return
        }

        if (selectedEndSec == null && sec === selectedStartSec) {
          resetPick()
          renderGrid()
          return
        }

        if (selectedEndSec == null) {
          const startSec = Math.min(selectedStartSec, sec)
          const endSec = Math.max(selectedStartSec, sec)
          const durSec = endSec - startSec

          if (durSec > MAX_SELECT_SEC) {
            alert("2시간 초과입니다.")
            return
          }

          if (!isRangeSelectable(dayIndex, startSec, endSec)) {
            return
          }

          selectedEndSec = sec
          renderGrid()
          return
        }

        selectedStartSec = sec
        selectedEndSec = null
        renderGrid()
      }

      function getCookie(name) {
        const value = `; ${document.cookie}`
        const parts = value.split(`; ${name}=`)
        if (parts.length === 2) return parts.pop().split(";").shift()
        return ""
      }

      const csrf = getCookie("csrf_access_token")

      const reserveBtnEl = document.getElementById("reserveBtn")
      if (reserveBtnEl) {
        reserveBtnEl.addEventListener("click", () => {
          const pick = getCurrentPickRange()
          if (!pick) return

          if (pick.durSec > MAX_SELECT_SEC) return
          if (!isRangeSelectable(dayIndex, pick.startSec, pick.endSec)) return
          const machineType = $("machine-type")
          console.log(machineType)
          if (!machineType) return
          console.log("테스트")
          const period = document.getElementById("ampm").value

          const saveData = [
            {
              start: makeDateTime(dayIndex, pick.startSec),
              end: makeDateTime(dayIndex, pick.endSec),
              period: period,
              item: machineType.item,
            },
          ]

          reservations.push({
            dayIndex,
            dateStr: dateStrForDayIndex(dayIndex),
            startSec: pick.startSec,
            endSec: pick.endSec,
            period: period,
            item: machineType.item,
            own: true,
          })

          saveReservationsData(saveData)

          resetPick()
          renderReservations()
          renderGrid()
        })
      }

      document.getElementById("ampm").addEventListener("change", () => {
        ampmByDay[dayIndex] = document.getElementById("ampm").value
        resetPick()
        renderGrid()
      })

      document.getElementById("prevDay").addEventListener("click", () => {
        dayIndex = (dayIndex + 6) % 7
        document.getElementById("ampm").value = ampmByDay[dayIndex]
        updateDayLabels()
        resetPick()
        renderGrid()
        renderReservations()
      })

      document.getElementById("nextDay").addEventListener("click", () => {
        dayIndex = (dayIndex + 1) % 7
        document.getElementById("ampm").value = ampmByDay[dayIndex]
        updateDayLabels()
        resetPick()
        renderGrid()
        renderReservations()
      })

      function dbResult(response) {
        if (!response.ok) {
          alert(xhr.responseJSON.msg)
          return true
        }
        return false
      }

      function loadReservationsData() {
        const item = machineData?.item
        if (!item) return
        console.log(item)
        $.ajax({
          type: "GET",
          url: "/reserve",
          dataType: "json",
          headers: { "X-CSRF-TOKEN": csrf },
          data: { item: item },
          success: function (resp) {
            const list = resp?.result || []
            reservations.length = 0
            ;(list || []).forEach((r) => {
              const ds = parseDateTime(r.start)
              const de = parseDateTime(r.end)
              if (!ds || !de) return

              const di = dayIndexFromDate(ds)
              if (di < 0 || di > 6) return

              reservations.push({
                dayIndex: di,
                dateStr: dateStrForDayIndex(di),
                startSec: secOfDayFromDate(ds),
                endSec: secOfDayFromDate(de),
                period: r.period,
                item: r.item,
                id: r.id,
                own: !!r.own,
                _id: r._id,
              })
            })

            renderReservations()
            renderGrid()
          },
          error: function (xhr) {
            errorMessage = xhr.responseJSON
            alert(errorMessage.message)
            dbResult(xhr.responseJSON)
          },
        })
      }

      function saveReservationsData(saveData) {
        const machineType = "{{ machine_type }}"

        saveData[0]["item"] = machineType
        console.log(saveData)
        $.ajax({
          type: "POST",
          url: "/reserve",
          dataType: "json",
          contentType: "application/json; charset=utf-8",
          data: JSON.stringify(saveData),
          success: function (resp) {
            if (dbResult(resp)) return
            loadReservationsData()
          },
          error: function (xhr) {
            errorMessage = xhr.responseJSON

            alert(errorMessage.info.description)
            dbResult(xhr.responseJSON)
            // renderGrid()
            renderReservations()
          },
        })
      }

      function deleteReservationsData(pk) {
        if (!pk) return

        $.ajax({
          type: "DELETE",
          url: `/reserve/${encodeURIComponent(pk)}`,
          dataType: "json",
          headers: { "X-CSRF-TOKEN": csrf },
          success: function (resp) {
            if (dbResult(resp)) return
            loadReservationsData()
          },
          error: function (xhr) {
            dbResult(xhr.responseJSON)
          },
        })
      }

      function loadServerReservations() {
        const serverReserves = JSON.parse(
          document.getElementById("reserves-data").textContent,
        )

        console.log("📦 서버에서 받은 reserves:", serverReserves)

        reservations.length = 0

        serverReserves.forEach((r) => {
          const ds = parseDateTime(r.start)
          const de = parseDateTime(r.end)

          console.log("🔎 파싱된 날짜:", ds, de)

          if (!ds || !de) return

          const di = dayIndexFromDate(ds)

          console.log("📅 계산된 dayIndex:", di)

          if (di < 0 || di > 6) return

          const obj = {
            dayIndex: di,
            dateStr: dateStrForDayIndex(di),
            startSec: secOfDayFromDate(ds),
            endSec: secOfDayFromDate(de),
            period: r.period,
            item: r.item,
            id: r.id,
            own: !!r.own,
            _id: r._id,
          }

          console.log("✅ reservations에 push:", obj)

          reservations.push(obj)
        })

        console.log("📊 최종 reservations 배열:", reservations)
      }
      // function displayTimeGrid() {
      //   const serverReserves = JSON.parse(
      //     document.getElementById("reserves-data").textContent,
      //   )
      //   console.log(serverReserves)
      //   // #timeGrid 안에 있는 모든 button을 찾아서 텍스트만 뽑아 배열로 만듭니다.
      //   const times = $("#timeGrid button")
      //     .map(function () {
      //       return $(this).text()
      //     })
      //     .get()

      //   console.log("현재 화면의 시간들:", times)
      // }

      updateDayLabels()
      document.getElementById("ampm").value = ampmByDay[dayIndex]
      loadServerReservations()
      renderGrid()
      renderReservations()
    </script>
  </body>
</html>
