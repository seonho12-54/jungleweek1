<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>신고 관리</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</head>


<body class="bg-gray-100 p-10">

<main class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow">

<h1 class="text-xl font-bold mb-6">세탁기 / 건조기 신고 관리</h1>

<div class="overflow-x-auto">

<table class="w-full text-left border-collapse">

<thead>
<tr class="bg-gray-200 text-gray-700 text-sm uppercase">
<th class="p-4 rounded-tl-lg">
신고자 ID
</th>

<th class="p-4">
신고 대상 (세탁기/건조기)
</th>

<th class="p-4 rounded-tr-lg">
관리
</th>
</tr>
</thead>


<tbody id="reportTable">

<!-- ajax로 채워짐 -->

</tbody>

</table>
</div>

</main>



<script>


// 토글 ON OFF 텍스트 변경 + 서버 전송
function toggleText(checkbox,item){

const textSpan = checkbox.nextElementSibling.nextElementSibling;

if (checkbox.checked) {

textSpan.innerText='ON'
textSpan.classList.remove('text-gray-500')
textSpan.classList.add('text-blue-600')

}else{

textSpan.innerText='OFF'
textSpan.classList.remove('text-blue-600')
textSpan.classList.add('text-gray-500')

}


// 서버로 POST
$.ajax({
type:"POST",
url:"/ban/machine",
contentType:"application/json",
data:JSON.stringify({
item:item
}),
success:function(res){
console.log("전송 성공",item)
},
error:function(){
alert("전송 실패")
}
})

}



// 신고 목록 UI 생성
function updateUI(reportData){

let reportUid = reportData.uid
let reportItem = reportData.item
let reportDate = reportData.date

let row = `
<tr class="border-b">

<td class="p-4 font-semibold text-gray-600">
${reportUid}
</td>

<td class="p-4 text-blue-600 font-bold">
${reportItem}
</td>

<td class="p-4">

<label class="relative inline-flex items-center cursor-pointer">

<input type="checkbox"
class="sr-only peer"
onchange="toggleText(this,'${reportItem}')">

<div class="w-11 h-6 bg-gray-300 rounded-full peer
peer-checked:bg-blue-600
peer-checked:after:translate-x-full
after:content-['']
after:absolute
after:top-[2px]
after:left-[2px]
after:bg-white
after:border-gray-300
after:border
after:rounded-full
after:h-5
after:w-5
after:transition-all"></div>

<span class="ml-3 text-sm font-bold text-gray-500 toggle-text">
OFF
</span>

</label>

</td>

</tr>
`

$("#reportTable").append(row)

}



// 신고 목록 가져오기
$.ajax({

type:"GET",

url:"/report",

success:function(response){

response.forEach(function(report){

updateUI(report)

})

},

error:function(){

alert("데이터 가져오기 실패")

}

})


</script>


</body>
</html>
